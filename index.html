<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 2rem;
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 88px;
            font-weight: 400;
            line-height: 1.1em;
            margin-bottom: 1rem;
            letter-spacing: -0.04em;
            color: #F8F6EE;
        }

        .tagline {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .subheading {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: #F8F6EE;
            opacity: 0.85;
            margin-bottom: 2rem;
            line-height: 1.6;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-button {
            display: inline-block;
            padding: 14px 32px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .links {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .links a {
            color: white;
            opacity: 0.8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .links a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="profile.jpg" alt="Aditya Gujaran" class="profile-image">
        <h1>Hi, I'm Aditya</h1>
        <p class="subheading">Over the past 8+ years, I have built a versatile design practice that includes UX research, Product design and Service design. I like clean information design, lemon cheesecakes and stormy views</p>
        <a href="mailto:aditya.gujaran@gmail.com" class="cta-button">Get in Touch</a>
    </div>
</body>
</html>
