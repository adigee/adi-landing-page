<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tokens.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            color: var(--color-text);
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 2rem;
            border: 4px solid var(--color-border);
        }

        h1 {
            font-family: var(--font-display);
            font-size: var(--text-hero);
            font-weight: var(--weight-regular);
            line-height: var(--leading-tight);
            margin-bottom: 1rem;
            letter-spacing: var(--tracking-tight);
            color: var(--color-surface);
        }

        .tagline {
            font-size: var(--text-md);
            opacity: 0.9;
            margin-bottom: 1.5rem;
            line-height: var(--leading-normal);
        }

        .subheading {
            font-family: var(--font-display);
            font-size: var(--text-body);
            font-weight: var(--weight-regular);
            color: var(--color-surface);
            opacity: 0.85;
            margin-bottom: 2rem;
            line-height: var(--leading-normal);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-button {
            display: inline-block;
            padding: 14px 32px;
            background: var(--color-bg);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            text-decoration: none;
            border-radius: 50px;
            font-weight: var(--weight-semibold);
            font-size: var(--text-base);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;
        }

        .cta-button:hover {
            background: var(--color-surface);
            color: var(--color-bg);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--color-shadow);
        }

        .cta-hint {
            margin-top: 0.75rem;
            font-size: var(--text-xs);
            color: var(--color-text);
            opacity: 0.45;
        }

        .links {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .links a {
            color: var(--color-text);
            opacity: 0.8;
            text-decoration: none;
            font-size: var(--text-sm);
            transition: opacity 0.2s;
        }

        .links a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="profile.jpg" alt="Aditya Gujaran" class="profile-image">
        <h1>Hi, I'm Aditya</h1>
        <p class="subheading">Over the past 8+ years, I have built a versatile design practice that includes UX research, Product design and Service design. I like clean information design, lemon cheesecakes and stormy views</p>
        <a href="mailto:aditya.gujaran@gmail.com" class="cta-button" id="ctaBtn" onclick="copyEmail(event)">Get in Touch</a>
        <p class="cta-hint">Click to copy email address 👆</p>
    </div>
    <script>
        const btn = document.getElementById('ctaBtn');
        const email = 'aditya.gujaran@gmail.com';
        let isCopied = false;

        btn.addEventListener('mouseenter', () => {
            if (!isCopied) btn.textContent = email;
        });

        btn.addEventListener('mouseleave', () => {
            if (!isCopied) btn.textContent = 'Get in Touch';
        });

        function copyEmail(e) {
            e.preventDefault();
            isCopied = true;
            navigator.clipboard.writeText(email).then(() => {
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    isCopied = false;
                    btn.textContent = 'Get in Touch';
                }, 2000);
            });
        }
    </script>
</body>
</html>
